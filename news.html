<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>企业咨询</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* 防止出现滚动条 */
  }
  .fullscreen-video {
    position: fixed; /* 固定定位 */
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -100; /* 把视频放在所有内容的后面 */
    object-fit: cover; /* 关键：确保视频铺满屏幕不拉伸 */
  }
</style>
</head>

<body>
	<video class="fullscreen-video" autoplay muted loop playsinline>
  <source src="NGGYU.mp4" type="video/mp4">
  您的浏览器不支持 HTML5 视频。
</video>
</body>
</html>
