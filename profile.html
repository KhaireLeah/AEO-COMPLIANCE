<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号设置 - 业务流程管理系统</title>
    <style type="text/css">
        :root {
            --primary-color: #1890ff;
            --bg-color: #f4f7f9;
            --text-main: rgba(0,0,0,0.88);
            --text-sub: rgba(0,0,0,0.65);
            --card: #ffffff;
            --border: rgba(0,0,0,0.08);
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        body {
            margin: 0;
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            color: var(--text-main);
        }
        .header {
            height: 70px;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 14px;
            color: var(--text-sub);
        }
        .link {
            color: var(--text-sub);
            text-decoration: none;
        }
        .link:hover { color: var(--primary-color); }
        .wrap {
            max-width: 960px;
            margin: 22px auto;
            padding: 0 18px 28px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 18px 18px 12px;
        }
        h1 {
            font-size: 18px;
            margin: 0 0 10px;
        }
        .hint {
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.7;
            margin-bottom: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-size: 13px;
            color: var(--text-sub);
        }
        input {
            height: 40px;
            padding: 0 12px;
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(24,144,255,0.12);
        }
        .section {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px dashed rgba(0,0,0,0.12);
        }
        .section-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding: 12px 0 6px;
        }
        .btn {
            height: 40px;
            padding: 0 14px;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.12);
            background: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .note {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(0,0,0,0.55);
            line-height: 1.6;
        }
        @media (max-width: 720px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">BPM System</div>
        <div class="header-right">
            <a class="link" href="login.html">返回门户</a>
            <a class="link" href="news.html">帮助中心</a>
            <div id="liveClock" style="font-family: monospace;"></div>
        </div>
    </header>
    <div class="wrap">
        <div class="card">
            <h1>账号设置</h1>
            <div class="hint">
                这里保存“用户名/邮箱”与“项目经理账号名”。站内通知会按用户名投递；若配置 EmailJS，则会在生成站内通知后尝试发送邮件。
            </div>

            <div class="grid">
                <div class="row">
                    <label>当前用户名</label>
                    <input id="profileName" placeholder="例如：项目经理D / 单证员A">
                </div>
                <div class="row">
                    <label>当前邮箱</label>
                    <input id="profileEmail" placeholder="例如：name@example.com">
                </div>
            </div>

            <div class="section">
                <div class="section-title">项目经理设置</div>
                <div class="grid">
                    <div class="row">
                        <label>项目经理账号名（通知投递对象）</label>
                        <input id="pmName" placeholder="默认：项目经理D">
                    </div>
                    <div class="row">
                        <label>项目经理邮箱</label>
                        <input id="pmEmail" placeholder="例如：pm@example.com">
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">EmailJS（可选）</div>
                <div class="grid">
                    <div class="row">
                        <label>Service ID</label>
                        <input id="emailjsServiceId" placeholder="EmailJS Service ID">
                    </div>
                    <div class="row">
                        <label>Template ID</label>
                        <input id="emailjsTemplateId" placeholder="EmailJS Template ID">
                    </div>
                    <div class="row" style="grid-column: 1 / -1;">
                        <label>Public Key</label>
                        <input id="emailjsPublicKey" placeholder="EmailJS Public Key">
                    </div>
                </div>
                <div class="note">
                    EmailJS 模板建议包含变量：to_email、subject、message。未配置时系统只会生成站内通知，不会发邮件。
                </div>
            </div>

            <div class="actions">
                <button class="btn" onclick="gotoDept('项目管理','xiangmu.html')">进入项目管理</button>
                <button class="btn" onclick="gotoDept('业务部','yewu.html')">进入业务部</button>
                <button class="btn" onclick="gotoDept('仓储部','cangchu.html')">进入仓储部</button>
                <button class="btn" onclick="gotoDept('财务部','caiwu.html')">进入财务部</button>
                <button class="btn" onclick="createPmTestDoc()">创建测试单据</button>
                <button class="btn" onclick="sendTestToPm()">测试发给项目经理</button>
                <button class="btn" onclick="sendTestToMe()">测试发给当前邮箱</button>
                <button class="btn btn-primary" onclick="saveAll()">保存</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="api.js"></script>
    <script>
        function updateTime() {
            const now = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const timeStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            const el = document.getElementById("liveClock");
            if (el) el.textContent = timeStr;
        }

        function loadProfile() {
            return safeJsonParse(localStorage.getItem('bpmProfile') || '', { name: '', email: '' }) || { name: '', email: '' };
        }

        function saveProfile(p) {
            localStorage.setItem('bpmProfile', JSON.stringify(p || { name: '', email: '' }));
        }

        function loadEmailMap() {
            return safeJsonParse(localStorage.getItem('bpmUserEmails') || '', {}) || {};
        }

        function saveEmailMap(map) {
            localStorage.setItem('bpmUserEmails', JSON.stringify(map || {}));
        }

        function upsertEmail(userName, email) {
            const n = String(userName || '').trim();
            const e = String(email || '').trim();
            if (!n) return;
            const map = loadEmailMap();
            if (e) map[n] = e;
            else delete map[n];
            saveEmailMap(map);
        }

        function loadEmailJsCfg() {
            return safeJsonParse(localStorage.getItem('bpmEmailjsConfig') || '', { serviceId: '', templateId: '', publicKey: '' }) || { serviceId: '', templateId: '', publicKey: '' };
        }

        function saveEmailJsCfg(cfg) {
            localStorage.setItem('bpmEmailjsConfig', JSON.stringify(cfg || { serviceId: '', templateId: '', publicKey: '' }));
        }

        function fillForm() {
            const p = loadProfile();
            document.getElementById('profileName').value = p.name || '';
            document.getElementById('profileEmail').value = p.email || '';

            const pmName = getPmUserName();
            document.getElementById('pmName').value = pmName || '';
            document.getElementById('pmEmail').value = getUserEmail(pmName) || '';

            const cfg = loadEmailJsCfg();
            document.getElementById('emailjsServiceId').value = cfg.serviceId || '';
            document.getElementById('emailjsTemplateId').value = cfg.templateId || '';
            document.getElementById('emailjsPublicKey').value = cfg.publicKey || '';
        }

        function saveAll() {
            const name = String(document.getElementById('profileName').value || '').trim();
            const email = String(document.getElementById('profileEmail').value || '').trim();
            const pmName = String(document.getElementById('pmName').value || '').trim();
            const pmEmail = String(document.getElementById('pmEmail').value || '').trim();

            const cfg = {
                serviceId: String(document.getElementById('emailjsServiceId').value || '').trim(),
                templateId: String(document.getElementById('emailjsTemplateId').value || '').trim(),
                publicKey: String(document.getElementById('emailjsPublicKey').value || '').trim()
            };

            saveProfile({ name, email });
            upsertEmail(name, email);
            setPmUserName(pmName);
            upsertEmail(getPmUserName(), pmEmail);
            saveEmailJsCfg(cfg);

            alert('已保存。建议回到门户重新进入各部门页面以刷新会话。');
        }

        function gotoDept(dept, url) {
            const name = String(document.getElementById('profileName').value || '').trim();
            if (name) {
                sessionStorage.setItem('currentUserName', name);
                localStorage.setItem('bpmCurrentUserName', name);
            }
            sessionStorage.setItem('authorizedDept', dept);
            localStorage.setItem('bpmAuthorizedDept', dept);
            window.location.href = url;
        }

        async function createPmTestDoc() {
            const name = String(document.getElementById('profileName').value || '').trim() || getPmUserName();
            const projectId = (localStorage.getItem('bpmCurrentProjectId') || '项目01').trim();
            const stamp = new Date();
            const fileName = `PM-TEST-${stamp.getFullYear()}${String(stamp.getMonth()+1).padStart(2,'0')}${String(stamp.getDate()).padStart(2,'0')}-${String(stamp.getHours()).padStart(2,'0')}${String(stamp.getMinutes()).padStart(2,'0')}${String(stamp.getSeconds()).padStart(2,'0')}.txt`;
            const content = `测试单据\\n创建时间：${stamp.toLocaleString()}\\n项目：${projectId}\\n上传者：${name}\\n`;
            const fileData = 'data:text/plain;base64,' + btoa(unescape(encodeURIComponent(content)));
            const doc = {
                projectId,
                name: fileName,
                type: '其他',
                fileExt: 'TXT',
                fileData,
                dept: '项目管理',
                action: '录入',
                applicant: name,
                status: 'pending',
                visibility: ['all']
            };
            const created = await addDoc(doc);
            if (!created || !created.id) {
                alert('创建测试单据失败：请检查网络连接。');
                return;
            }
            await addActivity({
                text: `${name} 上传了单据 ${fileName}`,
                fileName: fileName,
                uploader: name,
                visibility: ['all'],
                docId: created.id,
                projectId: projectId
            });
            alert('已创建测试单据。进入“项目管理”页应能在台账/动态看到它。');
        }

        async function sendTest(toEmail, label) {
            const ok = await sendEmailByEmailJs(toEmail, '测试邮件', `这是一封测试邮件（${label}）。如果你收到，说明 EmailJS 配置正确。`);
            if (ok) alert('已发出请求：请检查收件箱/垃圾箱。');
            else alert('发送失败：请检查 EmailJS 配置、模板变量以及网络连接。');
        }

        async function sendTestToPm() {
            const pmName = getPmUserName();
            const pmEmail = getUserEmail(pmName);
            if (!pmEmail) {
                alert('项目经理邮箱为空：请先填写并保存。');
                return;
            }
            await sendTest(pmEmail, `发送给项目经理(${pmName})`);
        }

        async function sendTestToMe() {
            const email = String(document.getElementById('profileEmail').value || '').trim();
            if (!email) {
                alert('当前邮箱为空：请先填写并保存。');
                return;
            }
            await sendTest(email, '发送给当前邮箱');
        }

        window.onload = function() {
            updateTime();
            setInterval(updateTime, 1000);
            fillForm();
        }
    </script>
</body>
</html>
